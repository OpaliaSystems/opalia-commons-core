name: sbt CI for build and test actions

on:
  push:
    branches:
      - 'main'
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - 'main'

jobs:

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v2
        with:
          fetch-depth: 0  # shallow clones should be disabled for a better relevancy of analysis
      - name: Setup JDK 11
        uses: actions/setup-java@v2
        with:
          java-version: 11
          distribution: adopt
          architecture: x64
      - name: Cache Ivy packages
        uses: actions/cache@v2
        with:
          path: ~/.ivy2
          key: ${{ runner.os }}-ivy2-${{ hashFiles('**/*.sbt') }}
          restore-keys: ${{ runner.os }}-ivy2
      - name: Prepare build tool
        run: |
          mkdir -p ~/.sbt/1.0/plugins/
          cp ./.github/workflows/global.sbt ~/.sbt/1.0/
          cp ./.github/workflows/plugins.sbt ~/.sbt/1.0/plugins/
      - name: Build project
        run: sbt compile
      - name: Test project
        run: sbt jacoco
      - name: Perform static code analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: sbt sonarScan
